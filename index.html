<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDATAPLUS - Buy Data</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 10px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>HDATAPLUS VTU</h2>
        <input type="number" id="phone" placeholder="Lambar Waya (080...)">
        <select id="network">
            <option value="MTN">MTN</option>
            <option value="GLO">GLO</option>
            <option value="AIRTEL">AIRTEL</option>
        </select>
        <button onclick="buyData()">Sayi Data</button>
        <p id="status"></p>
    </div>

    <script>
        async function buyData() {
            const phone = document.getElementById('phone').value;
            const network = document.getElementById('network').value;
            document.getElementById('status').innerText = "Ana kan aiki...";
            
            // Nan ne za mu hada da server dinmu daga baya
            alert("An tura bukata ta " + network + " zuwa " + phone);
        }
    </script>
</body>
</html>
