<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDATAPLUS | Saye da Sayarwa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #2c3e50; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #27ae60; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background-color: #219150; }
        .service-icon { font-size: 2rem; color: #27ae60; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark p-3">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">HDATAPLUS</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-3 mb-4 text-white" style="background: linear-gradient(to right, #27ae60, #2ecc71);">
            <h5>Barka da Zuwa!</h5>
            <p class="mb-0">Balance dinka: <strong>₦0.00</strong></p>
        </div>

        <div class="card p-4">
            <h4 class="text-center mb-4">Sayan Data cikin Sauri</h4>
            
            <label class="form-label">Zabi Kamfani (Network)</label>
            <select class="form-select mb-3">
                <option>MTN SME</option>
                <option>GLO Data</option>
                <option>AIRTEL Gift</option>
                <option>9MOBILE</option>
            </select>

            <label class="form-label">Lambar Waya</label>
            <input type="number" class="form-control mb-3" placeholder="08012345678">

            <label class="form-label">Zabi Bundle (MB/GB)</label>
            <select class="form-select mb-4">
                <option>500MB - ₦130</option>
                <option>1GB - ₦250</option>
                <option>2GB - ₦500</option>
                <option>5GB - ₦1,250</option>
            </select>

            <button class="btn btn-primary w-100" onclick="alert('Muna kan saita API din sayayya!')">SAYA YANZU</button>
        </div>

        <div class="row mt-4 text-center">
            <div class="col-4">
                <div class="card p-2"><span class="service-icon">📱</span><p>Kati</p></div>
            </div>
            <div class="col-4">
                <div class="card p-2"><span class="service-icon">💡</span><p>Wuta</p></div>
            </div>
            <div class="col-4">
                <div class="card p-2"><span class="service-icon">📺</span><p>Cable</p></div>
            </div>
        </div>
    </div>

    <footer class="mt-5 text-center text-muted p-3">
        <p>&copy; 2026 HDATAPLUS Tech</p>
    </footer>

</body>
</html>
